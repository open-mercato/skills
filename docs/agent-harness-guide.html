  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);

.btn {

  display: inline-flex;
  inline-size: fit-content;

  align-items: center;

  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;

}

.btn:is(.btn-block, .viz-tile) {

.btn:not(:disabled):hover {

  gap: 6px;

  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);

  border-radius: var(--radius-sm);

  pointer-events: none;

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {

.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);

  left: 0;

}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;div id=&quot;agent-harness-guide&quot;&gt;

      align-items: end;

    #agent-harness-guide .ah-field {
      min-width: min(100%, 190px);
      flex: 1 1 190px;
    }
    #agent-harness-guide .ah-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    #agent-harness-guide .ah-stat-note {
      color: var(--muted-foreground);
    }
    #agent-harness-guide .ah-figure {
      position: relative;
      width: 100%;

    #agent-harness-guide .ah-diagram {
      display: block;

      height: auto;
      overflow: visible;
    }
    #agent-harness-guide .ah-diagram-mobile {
      display: none;
    }
    #agent-harness-guide .ah-node rect {
      fill: color-mix(in srgb, var(--muted) 72%, transparent);
      stroke: var(--border);
      stroke-width: 1.5;
      transition: fill 180ms ease, stroke 180ms ease, opacity 180ms ease;
    }
    #agent-harness-guide .ah-node text {
      fill: var(--foreground);
      font-weight: 500;
    }
    #agent-harness-guide .ah-node .ah-subtext {
      fill: var(--muted-foreground);
      font-weight: 400;
    }
    #agent-harness-guide .ah-node.is-active rect {
      fill: color-mix(in srgb, var(--viz-series-1) 18%, var(--background));
      stroke: var(--viz-series-1);
    }
    #agent-harness-guide .ah-node.is-current rect {
      fill: var(--primary);
      stroke: var(--primary);
      stroke-width: 2;

    #agent-harness-guide .ah-node.is-current text,
    #agent-harness-guide .ah-node.is-current .ah-subtext {
      fill: var(--primary-foreground);

    #agent-harness-guide .ah-node.is-muted {
      opacity: 0.38;
    }
    #agent-harness-guide .ah-edge {
      fill: none;
      stroke: var(--border);
      stroke-width: 1.5;
      marker-end: url(#ah-arrow);
      transition: stroke 180ms ease, opacity 180ms ease;
    }
    #agent-harness-guide .ah-edge.is-active {
      stroke: var(--viz-series-1);
      stroke-width: 2;
    }
    #agent-harness-guide .ah-edge.is-muted {
      opacity: 0.25;
    }
    #agent-harness-guide .ah-loop-edge {
      stroke: var(--viz-series-2);

      stroke: var(--border);
      stroke-width: 1;
      stroke-dasharray: 5 5;

      fill: var(--muted-foreground);
      font-weight: 400;

    #agent-harness-guide .ah-pool-dot {
      fill: var(--muted);
      stroke: var(--border);

    #agent-harness-guide .ah-pool-dot.is-selected {
      fill: var(--viz-series-1);
      stroke: var(--viz-series-1);
    }
    #agent-harness-guide .ah-pool-dot.is-verifier {
      fill: var(--viz-series-2);
      stroke: var(--viz-series-2);

      fill: var(--muted-foreground);
      stroke: var(--muted-foreground);
    }
    #agent-harness-guide .ah-pool-label {
      fill: var(--foreground);
      font-weight: 400;
    }

      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      align-items: start;
    }
    #agent-harness-guide .ah-step {
      display: grid;
      justify-items: center;
      gap: 6px;
      color: var(--muted-foreground);
      min-width: 0;
      text-align: center;

    #agent-harness-guide .ah-step-mark {

      height: 24px;

      color: var(--muted-foreground);
      font-weight: 500;

    &lt;div class=&quot;ah-timeline&quot; id=&quot;ah-timeline&quot;&gt;
      &lt;div class=&quot;ah-step&quot; data-step=&quot;planned&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;1&lt;/span&gt;&lt;span&gt;planned&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ah-step&quot; data-step=&quot;claimed&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;2&lt;/span&gt;&lt;span&gt;claimed&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ah-step&quot; data-step=&quot;implementing&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;3&lt;/span&gt;&lt;span&gt;implementing&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ah-step is-current&quot; data-step=&quot;reviewing&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;4&lt;/span&gt;&lt;span&gt;reviewing&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ah-step&quot; data-step=&quot;fixing&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;5&lt;/span&gt;&lt;span&gt;fixing&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ah-step&quot; data-step=&quot;awaiting_validation&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;6&lt;/span&gt;&lt;span&gt;awaiting validation&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ah-step&quot; data-step=&quot;gated&quot;&gt;&lt;span class=&quot;ah-step-mark&quot;&gt;7&lt;/span&gt;&lt;span&gt;gated&lt;/span&gt;&lt;/div&gt;

  &lt;p class=&quot;ah-detail&quot; id=&quot;ah-detail&quot; aria-live=&quot;polite&quot;&gt;Blind packet reviewers see only the packet contract and diff; the final checkpoint uses one hash-bound om-code-review packet across six fresh contexts.&lt;/p&gt;

  &lt;div class=&quot;ah-legend text-small&quot; aria-label=&quot;Legend&quot;&gt;
    &lt;span class=&quot;ah-legend-item&quot;&gt;&lt;span class=&quot;ah-swatch ah-swatch-active&quot;&gt;&lt;/span&gt;active role or reviewer&lt;/span&gt;
    &lt;span class=&quot;ah-legend-item&quot;&gt;&lt;span class=&quot;ah-swatch ah-swatch-verify&quot;&gt;&lt;/span&gt;fresh verifier or fixer loop&lt;/span&gt;
    &lt;span class=&quot;ah-legend-item&quot;&gt;&lt;span class=&quot;ah-swatch ah-swatch-self-check&quot;&gt;&lt;/span&gt;same-family self-check&lt;/span&gt;
    &lt;span class=&quot;ah-legend-item&quot;&gt;&lt;span class=&quot;ah-swatch ah-swatch-gate&quot;&gt;&lt;/span&gt;human-controlled evidence boundary&lt;/span&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;agent-harness-guide&#x27;);
      if (!root) return;

      const profiles = {
        standard: {
          worker: false,
          review: false,
          verifier: false,
          fixer: false,
          workerStat: &#x27;Claude host&#x27;,
          workerNote: &#x27;Normal implementation; review is isolated&#x27;,
          reviewLabel: &#x27;Final review&#x27;,
          reviewerStat: &#x27;1 fresh context&#x27;,
          reviewerNote: &#x27;Claude runs real om-code-review&#x27;,
          hostSub: &#x27;implement · spawn reviewer&#x27;,
          detail: &#x27;Implementation stays with the host; final review moves to a new Claude context with no inherited implementation transcript.&#x27;
        },
        optimized: {
          worker: true,
          review: false,
          verifier: false,
          fixer: false,
          workerStat: &#x27;1 Codex worker&#x27;,
          workerNote: &#x27;Bounded implementation packet&#x27;,
          reviewLabel: &#x27;Final review&#x27;,
          reviewerStat: &#x27;1 fresh context&#x27;,
          reviewerNote: &#x27;Claude runs real om-code-review&#x27;,
          hostSub: &#x27;conduct · spawn reviewer&#x27;,
          detail: &#x27;A configured worker edits a bounded packet; a new Claude context reviews the integrated diff with om-code-review.&#x27;
        },
        multi: {
          worker: false,
          review: true,
          verifier: false,
          fixer: false,
          workerStat: &#x27;Claude host&#x27;,
          workerNote: &#x27;Implementation remains with the conductor&#x27;,
          reviewLabel: &#x27;Spec + final checkpoints&#x27;,
          reviewerStat: &#x27;6 fresh contexts&#x27;,
          reviewerNote: &#x27;One hash-bound om-code-review packet&#x27;,
          hostSub: &#x27;conduct · spawn Claude&#x27;,
          detail: &#x27;Fresh Claude, Codex, DeepSeek, Kimi, GLM, and MiMo start concurrently on the same rubric, packet, and subject; the matrix waits for Claude.&#x27;
        },
        &#x27;multi-optimized&#x27;: {
          worker: true,
          review: true,
          verifier: false,
          fixer: false,
          workerStat: &#x27;1 Codex worker&#x27;,
          workerNote: &#x27;Bounded implementation packet&#x27;,
          reviewLabel: &#x27;Spec + final checkpoints&#x27;,
          reviewerStat: &#x27;6 fresh contexts&#x27;,
          reviewerNote: &#x27;Codex is a same-family self-check&#x27;,
          hostSub: &#x27;conduct · spawn Claude&#x27;,
          detail: &#x27;All six run om-code-review on one packet; Codex reports findings but does not count as independent from the Codex worker.&#x27;
        },
        &#x27;high-assurance&#x27;: {
          worker: true,
          review: true,
          verifier: true,
          fixer: true,
          workerStat: &#x27;1 Codex worker&#x27;,
          workerNote: &#x27;Fresh fixer context, serialized writes&#x27;,
          reviewLabel: &#x27;Current packet review&#x27;,
          reviewerStat: &#x27;2 reviewers&#x27;,
          reviewerNote: &#x27;Then verifier; final checkpoint has 6 fresh contexts&#x27;,
          hostSub: &#x27;plan · spawn reviewer&#x27;,
          detail: &#x27;Blind packet review stays risk-scaled; the final diff still gets fresh Claude plus all five advisors on one om-code-review packet.&#x27;
        }
      };

      const states = [&#x27;planned&#x27;, &#x27;claimed&#x27;, &#x27;implementing&#x27;, &#x27;reviewing&#x27;, &#x27;fixing&#x27;, &#x27;awaiting_validation&#x27;, &#x27;gated&#x27;];
      const stateDetails = {
        planned: &#x27;A versioned manifest fixes the objective, risk, allowed paths, invariants, dependencies, and acceptance criteria.&#x27;,
        claimed: &#x27;Repository-global leases prevent overlapping packets across run directories and linked worktrees.&#x27;,
        implementing: &#x27;The sandboxed worker receives one packet, cannot publish, and is rejected for Git-ref or out-of-scope changes.&#x27;,
        reviewing: &#x27;Blind reviewers receive distinct lenses and only the packet contract plus exact diff.&#x27;,
        fixing: &#x27;Only independently verified findings reach a fresh fixer invocation; retry and input budgets are bounded.&#x27;,
        awaiting_validation: &#x27;The reviewed diff is frozen by SHA-256 while trusted commands or manual checks collect acceptance evidence.&#x27;,
        gated: &#x27;Every acceptance criterion is covered for the same diff; leases release and the packet may enter the staged handoff.&#x27;
      };

      const profileButtons = [...root.querySelectorAll(&#x27;[data-profile-button]&#x27;)];
      const riskSelect = root.querySelector(&#x27;#ah-risk&#x27;);
      const stateSelect = root.querySelector(&#x27;#ah-state&#x27;);
      const workerStat = root.querySelector(&#x27;#ah-worker-stat&#x27;);
      const workerNote = root.querySelector(&#x27;#ah-worker-note&#x27;);
      const reviewerLabel = root.querySelector(&#x27;#ah-reviewer-label&#x27;);
      const reviewerStat = root.querySelector(&#x27;#ah-reviewer-stat&#x27;);
      const reviewerNote = root.querySelector(&#x27;#ah-reviewer-note&#x27;);
      const detail = root.querySelector(&#x27;#ah-detail&#x27;);
      const reviewerSub = root.querySelector(&#x27;#ah-review-node-sub&#x27;);
      const reviewerSubMobile = root.querySelector(&#x27;#ah-review-node-sub-mobile&#x27;);
      const reviewerTitle = root.querySelector(&#x27;#ah-review-node-title&#x27;);
      const reviewerTitleMobile = root.querySelector(&#x27;#ah-review-node-title-mobile&#x27;);
      const hostSub = root.querySelector(&#x27;#ah-host-sub&#x27;);
      const hostSubMobile = root.querySelector(&#x27;#ah-host-sub-mobile&#x27;);
      const poolHeading = root.querySelector(&#x27;#ah-pool-heading&#x27;);
      const codexLabel = root.querySelector(&#x27;[data-codex-label]&#x27;);
      let selectedProfile = &#x27;high-assurance&#x27;;

      function setNode(name, active, current) {
        root.querySelectorAll(`[data-node=&quot;${name}&quot;]`).forEach((node) =&gt; {
          node.classList.toggle(&#x27;is-active&#x27;, active);
          node.classList.toggle(&#x27;is-muted&#x27;, !active);
          node.classList.toggle(&#x27;is-current&#x27;, current &amp;&amp; active);
        });
      }

      function setEdge(name, active) {
        root.querySelectorAll(`[data-edge=&quot;${name}&quot;]`).forEach((edge) =&gt; {
          edge.classList.toggle(&#x27;is-active&#x27;, active);
          edge.classList.toggle(&#x27;is-muted&#x27;, !active);
        });
      }

      function reviewerCount() {
        return [&#x27;high&#x27;, &#x27;critical&#x27;].includes(riskSelect.value) ? 2 : 1;
      }

      function updateReviewerPool(profile) {
        const count = selectedProfile === &#x27;high-assurance&#x27; ? reviewerCount() : profile.review ? 5 : 0;
        const ordered = [&#x27;deepseek&#x27;, &#x27;kimi&#x27;, &#x27;glm&#x27;, &#x27;mimo&#x27;];
        root.querySelectorAll(&#x27;[data-reviewer-dot]&#x27;).forEach((dot) =&gt; {
          dot.classList.remove(&#x27;is-selected&#x27;, &#x27;is-verifier&#x27;, &#x27;is-self-check&#x27;);
          const id = dot.getAttribute(&#x27;data-reviewer-dot&#x27;);
          if (selectedProfile === &#x27;high-assurance&#x27;) {
            const index = ordered.indexOf(id);
            if (index &gt;= 0 &amp;&amp; index &lt; count) dot.classList.add(&#x27;is-selected&#x27;);
            if (index === count) dot.classList.add(&#x27;is-verifier&#x27;);
          } else if (id === &#x27;claude&#x27;) dot.classList.add(&#x27;is-selected&#x27;);
          else if (profile.review &amp;&amp; id === &#x27;codex&#x27; &amp;&amp; selectedProfile === &#x27;multi-optimized&#x27;) dot.classList.add(&#x27;is-self-check&#x27;);
          else if (profile.review) dot.classList.add(&#x27;is-selected&#x27;);
        });
        poolHeading.textContent = selectedProfile === &#x27;high-assurance&#x27; ? &#x27;Packet reviewer pool&#x27; : &#x27;One bound om-code-review packet&#x27;;
        codexLabel.textContent = selectedProfile === &#x27;multi-optimized&#x27; ? &#x27;Codex self-check&#x27; : &#x27;Codex&#x27;;
        reviewerTitle.textContent = selectedProfile === &#x27;high-assurance&#x27; ? &#x27;Blind reviewers&#x27; : &#x27;om-code-review jury&#x27;;
        reviewerTitleMobile.textContent = reviewerTitle.textContent;
        const label = selectedProfile === &#x27;high-assurance&#x27;
          ? `${count} ${count === 1 ? &#x27;family&#x27; : &#x27;families&#x27;} · ${count === 1 ? &#x27;combined lenses&#x27; : &#x27;2 lenses&#x27;}`
          : profile.review ? &#x27;5 advisors · fresh · parallel&#x27; : &#x27;not selected&#x27;;
        reviewerSub.textContent = label;
        reviewerSubMobile.textContent = label;
      }

      function updateState() {
        const state = stateSelect.value;
        const currentIndex = states.indexOf(state);
        root.querySelectorAll(&#x27;[data-step]&#x27;).forEach((step) =&gt; {
          const index = states.indexOf(step.getAttribute(&#x27;data-step&#x27;));
          step.classList.toggle(&#x27;is-complete&#x27;, index &lt; currentIndex);
          step.classList.toggle(&#x27;is-current&#x27;, index === currentIndex);
        });
        if (selectedProfile === &#x27;high-assurance&#x27;) detail.textContent = stateDetails[state];
        setNode(&#x27;worker&#x27;, profiles[selectedProfile].worker, state === &#x27;implementing&#x27;);
        setNode(&#x27;review&#x27;, profiles[selectedProfile].review, state === &#x27;reviewing&#x27;);
        setNode(&#x27;fixer&#x27;, profiles[selectedProfile].fixer, state === &#x27;fixing&#x27;);
        setNode(&#x27;verifier&#x27;, profiles[selectedProfile].verifier, state === &#x27;reviewing&#x27;);
        setNode(&#x27;gate&#x27;, true, state === &#x27;awaiting_validation&#x27; || state === &#x27;gated&#x27;);
        setNode(&#x27;stage&#x27;, true, state === &#x27;gated&#x27;);
      }

      function updateProfile(profileName) {
        selectedProfile = profileName;
        root.dataset.profile = profileName;
        const profile = profiles[profileName];
        profileButtons.forEach((button) =&gt; {
          const selected = button.getAttribute(&#x27;data-profile-button&#x27;) === profileName;
          button.setAttribute(&#x27;aria-pressed&#x27;, String(selected));
          button.classList.toggle(&#x27;btn-primary&#x27;, selected);
          button.classList.toggle(&#x27;btn-ghost&#x27;, !selected);
        });
        riskSelect.disabled = profileName !== &#x27;high-assurance&#x27;;
        stateSelect.disabled = profileName !== &#x27;high-assurance&#x27;;
        workerStat.textContent = profile.workerStat;
        workerNote.textContent = profile.workerNote;
        reviewerLabel.textContent = profile.reviewLabel;
        reviewerStat.textContent = profile.reviewerStat;
        reviewerNote.textContent = profile.reviewerNote;
        hostSub.textContent = profile.hostSub;
        hostSubMobile.textContent = profile.hostSub;
        detail.textContent = profile.detail;
        setNode(&#x27;host&#x27;, true, false);
        setNode(&#x27;worker&#x27;, profile.worker, false);
        setNode(&#x27;review&#x27;, profile.review, false);
        setNode(&#x27;verifier&#x27;, profile.verifier, false);
        setNode(&#x27;fixer&#x27;, profile.fixer, false);
        setNode(&#x27;gate&#x27;, true, false);
        setNode(&#x27;stage&#x27;, true, false);
        setEdge(&#x27;host-worker&#x27;, profile.worker);
        setEdge(&#x27;worker-review&#x27;, profile.worker &amp;&amp; profile.review);
        setEdge(&#x27;host-review&#x27;, profile.review);
        setEdge(&#x27;review-verify&#x27;, profile.verifier);
        setEdge(&#x27;verify-fix&#x27;, profile.fixer);
        setEdge(&#x27;review-gate&#x27;, profile.review);
        setEdge(&#x27;worker-gate&#x27;, profile.worker);
        setEdge(&#x27;gate-stage&#x27;, true);
        updateReviewerPool(profile);
        if (profileName === &#x27;high-assurance&#x27;) updateRisk();
      }

      function updateRisk() {
        const count = reviewerCount();
        reviewerStat.textContent = `${count} ${count === 1 ? &#x27;reviewer&#x27; : &#x27;reviewers&#x27;}`;
        reviewerNote.textContent = &#x27;Then verifier; final checkpoint has 6 fresh contexts&#x27;;
        updateReviewerPool(profiles[selectedProfile]);
        updateState();
      }

      profileButtons.forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; updateProfile(button.getAttribute(&#x27;data-profile-button&#x27;)));
      });
      riskSelect.addEventListener(&#x27;change&#x27;, updateRisk);
      stateSelect.addEventListener(&#x27;change&#x27;, updateState);
      updateProfile(&#x27;high-assurance&#x27;);
      updateState();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
