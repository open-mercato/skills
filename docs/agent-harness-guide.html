#harness-training .chapter-tag::before {
  content: &quot;&quot;;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

#harness-training .visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

@media (max-width: 1100px) {
  #harness-training .topbar {
    grid-template-columns: minmax(170px, 1fr) minmax(180px, 1fr);
  }

  #harness-training .chapter-progress {
    display: none;
  }

  #harness-training .section-head {
    grid-template-columns: 90px 1fr;
  }

  #harness-training .section-head &gt; *:not(.section-index):not(h2) {
    grid-column: 2;
  }

  #harness-training .hero-stage,
  #harness-training .council-stage {
    grid-template-columns: 1fr 1fr;
  }

  #harness-training .hero-stage-cell:last-child,
  #harness-training .verdict-panel {
    grid-column: 1 / -1;
    min-height: auto;
    border-top: 1px solid var(--hairline);
  }

  #harness-training .hero-stage-cell:nth-child(2) {
    border-right: 0;
  }

  #harness-training .architecture-diagram {
    grid-template-columns: 1fr;
  }

  #harness-training .arch-arrow {
    transform: rotate(90deg);
  }

  #harness-training .profile-layout,
  #harness-training .high-assurance-stage,
  #harness-training .safety-layout {
    grid-template-columns: 1fr;
  }

  #harness-training .packet-manifest {
    position: relative;
    top: auto;
  }

  #harness-training .journey-line {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  #harness-training .flow-step:nth-child(4)::after,
  #harness-training .flow-step:nth-child(8)::after {
    display: none;
  }

  #harness-training .flow-step:nth-child(n+5) {
    margin-top: 8px;
  }

  #harness-training .artifact-chain {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  #harness-training .artifact-chain::before {
    display: none;
  }

  #harness-training .artifact-button:nth-child(n+5) {
    grid-column: span 1;
  }
}

@media (max-width: 760px) {
  #harness-training .topbar {
    position: relative;
    grid-template-columns: 1fr;
  }

  #harness-training .top-actions {
    justify-content: flex-start;
  }

  #harness-training .brand-lockup .open-mercato-logo { height: 22px; }
  #harness-training .brand-lockup .omdyo-logo { height: 18px; }

  #harness-training .chapter {
    min-height: 0;
    padding-block: 76px;
  }

  #harness-training[data-mode=&quot;presenter&quot;] .chapter {
    min-height: 760px;
  }

  #harness-training .section-head {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  #harness-training .section-head &gt; *:not(.section-index):not(h2) {
    grid-column: auto;
  }

  #harness-training .hero {
    min-height: 0;
  }

  #harness-training h1 {
    font-size: clamp(54px, 17vw, 86px);
  }

  #harness-training h2 {
    font-size: clamp(42px, 13vw, 68px);
  }

  #harness-training .hero-stage,
  #harness-training .council-stage {
    grid-template-columns: 1fr;
  }

  #harness-training .hero-stage-cell,
  #harness-training .hero-stage-cell:nth-child(2) {
    border-right: 0;
    border-bottom: 1px solid var(--hairline);
  }

  #harness-training .hero-stage-cell:last-child {
    border-bottom: 0;
  }

  #harness-training .arch-layer {
    grid-template-columns: 1fr;
    gap: 6px;
  }

  #harness-training .profile-layout {
    grid-template-columns: minmax(0, 1fr);
  }

  #harness-training .profile-button {
    min-height: 128px;
    padding: 17px;
  }

  #harness-training .high-assurance-callout {
    grid-template-columns: 1fr;
  }

  #harness-training .topology {
    grid-template-columns: 1fr;
    gap: 30px;
  }

  #harness-training .topology::before {
    inset: 8% auto 8% 50%;
    width: 1px;
    height: auto;
  }

  #harness-training .journey-line {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  #harness-training .flow-step:nth-child(even)::after {
    display: none;
  }

  #harness-training .flow-step:nth-child(n+3) {
    margin-top: 8px;
  }

  #harness-training .journey-detail,
  #harness-training .artifact-inspector {
    grid-template-columns: 1fr;
  }

  #harness-training .journey-proof {
    padding: 18px 0 0;
    border-top: 1px solid rgba(245, 234, 223, 0.18);
    border-left: 0;
  }

  #harness-training .council-stage {
    min-height: 0;
  }

  #harness-training .council-orbit {
    min-height: 390px;
    transform: scale(0.88);
  }

  #harness-training .review-matrix {
    display: none;
  }

  #harness-training .mobile-findings {
    display: grid;
    gap: 8px;
    margin-top: 24px;
  }

  #harness-training .mobile-finding {
    padding: 16px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
  }

  #harness-training .mobile-finding span {
    display: block;
    margin-top: 8px;
    color: var(--lime);
    font-size: 12px;
  }

  #harness-training .state-machine {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  #harness-training .state-node:nth-child(even)::after {
    display: none;
  }

  #harness-training .state-node.gate-node {
    grid-column: 2;
  }

  #harness-training .state-loop {
    grid-column: 1 / -1;
  }

  #harness-training .assurance-readout {
    grid-template-columns: 1fr;
  }

  #harness-training .attack-list {
    grid-template-columns: 1fr;
  }

  #harness-training .artifact-chain {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  #harness-training .handoff-stage {
    grid-template-columns: 1fr;
  }

  #harness-training .boundary-column {
    min-height: 72px;
  }

  #harness-training .boundary-column::before {
    inset: auto 0 50%;
    width: auto;
    height: 4px;
  }

  #harness-training .boundary-label {
    padding: 4px 9px;
    writing-mode: horizontal-tb;
  }
}

@media (max-width: 420px) {
  #harness-training .mode-switch {
    width: 100%;
  }

  #harness-training .top-button {
    flex: 1;
  }

  #harness-training .profile-matrix {
    grid-template-columns: 1fr;
  }

  #harness-training .profile-axis {
    display: none;
  }

  #harness-training .profile-button,
  #harness-training .high-assurance-callout {
    grid-column: 1;
  }

  #harness-training .profile-foot,
  #harness-training .state-machine,
  #harness-training .journey-line,
  #harness-training .artifact-chain {
    grid-template-columns: 1fr;
  }

  #harness-training .flow-step::after,
  #harness-training .state-node::after {
    display: none;
  }

  #harness-training .state-node.gate-node {
    grid-column: 1;
  }

  #harness-training .state-loop {
    grid-template-columns: 1fr;
  }

  #harness-training .shield-layer {
    padding-top: 9px;
    font-size: 10px;
  }

  /* Council ring: the side orbs used fixed 32px insets while the top/bottom
     orbs are centred with calc(50% - r), so below a ~292px orbit they collided.
     Scale the ring geometry down so it stays clear on 320px-class phones. */
  #harness-training .review-orb {
    width: 62px;
    height: 62px;
    font-size: 10px;
  }

  #harness-training .review-orb.host {
    width: 82px;
    height: 82px;
  }

  #harness-training .council-orbit {
    min-height: 330px;
  }

  #harness-training .council-orbit::before {
    width: 280px;
    height: 280px;
  }

  #harness-training .council-orbit::after {
    width: 176px;
    height: 176px;
  }

  #harness-training .review-orb:nth-of-type(2),
  #harness-training .review-orb:nth-of-type(5) {
    left: calc(50% - 31px);
  }

  #harness-training .review-orb:nth-of-type(3) {
    top: 62px;
    right: 2px;
  }

  #harness-training .review-orb:nth-of-type(7) {
    top: 62px;
    left: 2px;
  }

  #harness-training .review-orb:nth-of-type(4) {
    right: 18px;
    bottom: 28px;
  }

  #harness-training .review-orb:nth-of-type(6) {
    left: 18px;
    bottom: 28px;
  }
}

@media (prefers-reduced-motion: no-preference) {
  #harness-training .agent-cloud,
  #harness-training .council-orbit {
    animation: harness-float 7s ease-in-out infinite alternate;
  }

  #harness-training .packet-visual,
  #harness-training .sealed-packet {
    animation: packet-breathe 3.4s ease-in-out infinite alternate;
  }

  #harness-training .tetris-one {
    animation: tetris-drift 8s ease-in-out infinite alternate;
  }

  @keyframes harness-float {
    from { transform: translateY(-4px); }
    to { transform: translateY(7px); }
  }

  @keyframes packet-breathe {
    from { box-shadow: 0 0 32px rgba(180, 243, 114, 0.04); }
    to { box-shadow: 0 0 72px rgba(180, 243, 114, 0.14); }
  }

  @keyframes tetris-drift {
    from { transform: translate(0, 0) rotate(17deg); }
    to { transform: translate(-18px, 16px) rotate(29deg); }
  }
}

          &lt;p class=&quot;section-copy&quot;&gt;The boundary is layered: prevention, isolation, trust, detection, and bounded execution. Select a failure to see where it stops.&lt;/p&gt;
        &lt;/div&gt;

        &lt;div class=&quot;safety-layout&quot;&gt;
          &lt;div class=&quot;shield&quot; aria-label=&quot;Five-layer harness safety shield&quot;&gt;
            &lt;div class=&quot;shield-layer is-active&quot; data-layer=&quot;prevention&quot; style=&quot;--inset:0%&quot;&gt;Prevention&lt;/div&gt;
            &lt;div class=&quot;shield-layer&quot; data-layer=&quot;isolation&quot; style=&quot;--inset:9%&quot;&gt;Isolation&lt;/div&gt;
            &lt;div class=&quot;shield-layer&quot; data-layer=&quot;trust&quot; style=&quot;--inset:18%&quot;&gt;Trust&lt;/div&gt;
            &lt;div class=&quot;shield-layer&quot; data-layer=&quot;detection&quot; style=&quot;--inset:27%&quot;&gt;Detection&lt;/div&gt;
            &lt;div class=&quot;shield-layer&quot; data-layer=&quot;bounds&quot; style=&quot;--inset:36%&quot;&gt;Bounds&lt;/div&gt;
            &lt;div class=&quot;shield-core&quot;&gt;reviewed&lt;br&gt;diff&lt;/div&gt;
          &lt;/div&gt;

          &lt;div&gt;
            &lt;div class=&quot;attack-list&quot;&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;push&quot; aria-pressed=&quot;true&quot;&gt;Worker tries to publish&lt;span&gt;git push / PR creation&lt;/span&gt;&lt;/button&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;network&quot; aria-pressed=&quot;false&quot;&gt;Worker reaches the network&lt;span&gt;sandbox capability violation&lt;/span&gt;&lt;/button&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;ref&quot; aria-pressed=&quot;false&quot;&gt;Reviewer mutates Git state&lt;span&gt;ref or reflog change&lt;/span&gt;&lt;/button&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;stale&quot; aria-pressed=&quot;false&quot;&gt;Review artifact is stale&lt;span&gt;packet hash mismatch&lt;/span&gt;&lt;/button&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;branch-config&quot; aria-pressed=&quot;false&quot;&gt;Task branch changes adapter&lt;span&gt;untrusted executable config&lt;/span&gt;&lt;/button&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;claim-tests&quot; aria-pressed=&quot;false&quot;&gt;Model says tests passed&lt;span&gt;untrusted model assertion&lt;/span&gt;&lt;/button&gt;
              &lt;button class=&quot;attack-button&quot; type=&quot;button&quot; data-attack=&quot;loop&quot; aria-pressed=&quot;false&quot;&gt;Fix loop never converges&lt;span&gt;retries and budgets&lt;/span&gt;&lt;/button&gt;
            &lt;/div&gt;

            &lt;div class=&quot;safety-readout&quot; aria-live=&quot;polite&quot;&gt;
              &lt;span class=&quot;micro-label&quot; style=&quot;color:inherit&quot;&gt;Enforcing layer&lt;/span&gt;
              &lt;h3 id=&quot;safety-layer-title&quot;&gt;Prevention&lt;/h3&gt;
              &lt;p id=&quot;safety-layer-copy&quot;&gt;Tool-boundary hooks deny push and pull-request creation during a run. Final state assertions remain the backstop.&lt;/p&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;chapter chapter-dark chapter-artifacts&quot; data-chapter=&quot;7&quot; aria-labelledby=&quot;artifacts-title&quot;&gt;
      &lt;div class=&quot;chapter-inner&quot;&gt;
        &lt;div class=&quot;section-head&quot;&gt;
          &lt;div class=&quot;section-index&quot;&gt;07 — Evidence trail&lt;/div&gt;
          &lt;h2 id=&quot;artifacts-title&quot;&gt;Artifacts, not vibes.&lt;/h2&gt;
          &lt;p class=&quot;section-copy&quot;&gt;Versioned JSON is authoritative. Human-readable Markdown is rendered from it. Every consequential artifact binds to the exact subject, rubric, provenance, or diff it claims to represent.&lt;/p&gt;
        &lt;/div&gt;

        &lt;div class=&quot;artifact-chain&quot; aria-label=&quot;Harness artifact chain&quot;&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;start&quot; aria-pressed=&quot;true&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;01&lt;/span&gt;&lt;strong&gt;Start state&lt;/strong&gt;&lt;/button&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;manifest&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;02&lt;/span&gt;&lt;strong&gt;Packet manifest&lt;/strong&gt;&lt;/button&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;review-packet&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;03&lt;/span&gt;&lt;strong&gt;Review packet&lt;/strong&gt;&lt;/button&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;claude&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;04&lt;/span&gt;&lt;strong&gt;Fresh Claude result&lt;/strong&gt;&lt;/button&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;council&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;05&lt;/span&gt;&lt;strong&gt;Council results&lt;/strong&gt;&lt;/button&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;gate&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;06&lt;/span&gt;&lt;strong&gt;Gate evidence&lt;/strong&gt;&lt;/button&gt;
          &lt;button class=&quot;artifact-button&quot; type=&quot;button&quot; data-artifact=&quot;handoff&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;artifact-icon&quot;&gt;07&lt;/span&gt;&lt;strong&gt;Handoff report&lt;/strong&gt;&lt;/button&gt;
        &lt;/div&gt;

        &lt;div class=&quot;artifact-inspector&quot; aria-live=&quot;polite&quot;&gt;
          &lt;span class=&quot;chapter-tag&quot; id=&quot;artifact-type&quot;&gt;Capture&lt;/span&gt;
          &lt;div&gt;
            &lt;h3 id=&quot;artifact-title&quot;&gt;Start state&lt;/h3&gt;
            &lt;p id=&quot;artifact-copy&quot; style=&quot;margin-top:10px&quot;&gt;Records HEAD, local refs, relevant reflogs, and baseline worktree state before any edit. Later staging must match this Git history exactly.&lt;/p&gt;
          &lt;/div&gt;
          &lt;div class=&quot;hash-readout&quot; id=&quot;artifact-hash&quot;&gt;binds → git state&lt;br&gt;sha256:02e8…bb61&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;chapter chapter-dark handoff&quot; data-chapter=&quot;8&quot; aria-labelledby=&quot;handoff-title&quot;&gt;
      &lt;div class=&quot;chapter-inner&quot;&gt;
        &lt;div class=&quot;section-head&quot;&gt;
          &lt;div class=&quot;section-index&quot;&gt;08 — Handoff&lt;/div&gt;
          &lt;h2 id=&quot;handoff-title&quot;&gt;Automation stops at the index.&lt;/h2&gt;
          &lt;p class=&quot;section-copy&quot;&gt;Success is a reviewable staged checkout with evidence, not a published change. The right side of this line belongs to a person.&lt;/p&gt;
        &lt;/div&gt;

        &lt;div class=&quot;handoff-stage&quot; aria-label=&quot;Stage-only handoff and human publication boundary&quot;&gt;
          &lt;div class=&quot;handoff-side&quot;&gt;
            &lt;span class=&quot;chapter-tag accent-lime&quot;&gt;Harness leaves&lt;/span&gt;
            &lt;h3 style=&quot;margin-top:24px&quot;&gt;A verified staged worktree&lt;/h3&gt;
            &lt;ul class=&quot;handoff-list&quot;&gt;
              &lt;li&gt;Unchanged HEAD, refs, and reflogs&lt;/li&gt;
              &lt;li&gt;Non-empty allowlisted staged diff&lt;/li&gt;
              &lt;li&gt;Real validation evidence&lt;/li&gt;
              &lt;li&gt;Reviewer status and finding matrix&lt;/li&gt;
              &lt;li&gt;Suggested commit and prepared PR body&lt;/li&gt;
              &lt;li&gt;Raw model artifacts kept outside the index&lt;/li&gt;
            &lt;/ul&gt;
          &lt;/div&gt;

          &lt;div class=&quot;boundary-column&quot;&gt;&lt;span class=&quot;boundary-label&quot;&gt;Human boundary&lt;/span&gt;&lt;/div&gt;

          &lt;div class=&quot;handoff-side human-side&quot;&gt;
            &lt;span class=&quot;chapter-tag accent-orange&quot;&gt;Human owns&lt;/span&gt;
            &lt;h3 style=&quot;margin-top:24px&quot;&gt;The publication decision&lt;/h3&gt;
            &lt;div class=&quot;publication-path&quot;&gt;
              &lt;div class=&quot;publication-step&quot;&gt;&lt;span&gt;01&lt;/span&gt;&lt;strong&gt;Review staged diff&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;publication-step&quot;&gt;&lt;span&gt;02&lt;/span&gt;&lt;strong&gt;Commit intentionally&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;publication-step&quot;&gt;&lt;span&gt;03&lt;/span&gt;&lt;strong&gt;Push the branch&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;publication-step&quot;&gt;&lt;span&gt;04&lt;/span&gt;&lt;strong&gt;Open the pull request&lt;/strong&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;

        &lt;p class=&quot;final-line&quot;&gt;Many models can challenge the change.&lt;br&gt;&lt;span&gt;Only a human can release it.&lt;/span&gt;&lt;/p&gt;
        &lt;div class=&quot;brand-lockup footer-lockup&quot; aria-label=&quot;Open Mercato and Omdyo&quot;&gt;

&lt;script&gt;
(function () {
  var root = document.getElementById(&#x27;harness-training&#x27;);
  if (!root) return;

  var chapters = Array.prototype.slice.call(root.querySelectorAll(&#x27;[data-chapter]&#x27;));
  var progress = Array.prototype.slice.call(root.querySelectorAll(&#x27;.chapter-progress span&#x27;));
  var chapterName = root.querySelector(&#x27;.chapter-name&#x27;);
  var currentChapter = 0;

  function setCurrentChapter(index, shouldFocus) {
    currentChapter = Math.max(0, Math.min(chapters.length - 1, index));
    chapters.forEach(function (chapter, i) {
      chapter.classList.toggle(&#x27;is-current&#x27;, i === currentChapter);
    });
    progress.forEach(function (item, i) {
      item.classList.toggle(&#x27;is-active&#x27;, i &lt;= currentChapter);
    });
    if (chapterName) chapterName.textContent = String(currentChapter + 1).padStart(2, &#x27;0&#x27;) + &#x27; / &#x27; + String(chapters.length).padStart(2, &#x27;0&#x27;);
    if (root.getAttribute(&#x27;data-mode&#x27;) === &#x27;presenter&#x27;) {
      chapters[currentChapter].scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
      if (shouldFocus) {
        var heading = chapters[currentChapter].querySelector(&#x27;h1, h2&#x27;);
        if (heading) heading.setAttribute(&#x27;tabindex&#x27;, &#x27;-1&#x27;);
        if (heading) heading.focus({ preventScroll: true });
      }
    }
  }

  root.querySelectorAll(&#x27;[data-mode-button]&#x27;).forEach(function (button) {
    button.addEventListener(&#x27;click&#x27;, function () {
      var mode = button.getAttribute(&#x27;data-mode-button&#x27;);
      root.setAttribute(&#x27;data-mode&#x27;, mode);
      root.querySelectorAll(&#x27;[data-mode-button]&#x27;).forEach(function (peer) {
        peer.setAttribute(&#x27;aria-pressed&#x27;, String(peer === button));
      });
      setCurrentChapter(currentChapter, false);
    });
  });

  root.querySelectorAll(&#x27;[data-presenter]&#x27;).forEach(function (button) {
    button.addEventListener(&#x27;click&#x27;, function () {
      setCurrentChapter(currentChapter + (button.getAttribute(&#x27;data-presenter&#x27;) === &#x27;next&#x27; ? 1 : -1), true);
    });
  });

  document.addEventListener(&#x27;keydown&#x27;, function (event) {
    if (root.getAttribute(&#x27;data-mode&#x27;) !== &#x27;presenter&#x27;) return;
    if (event.key === &#x27;ArrowRight&#x27; || event.key === &#x27;PageDown&#x27;) {
      event.preventDefault();
      setCurrentChapter(currentChapter + 1, false);
    }
    if (event.key === &#x27;ArrowLeft&#x27; || event.key === &#x27;PageUp&#x27;) {
      event.preventDefault();
      setCurrentChapter(currentChapter - 1, false);
    }
    if (event.key === &#x27;Escape&#x27;) {
      root.setAttribute(&#x27;data-mode&#x27;, &#x27;explore&#x27;);
      root.querySelectorAll(&#x27;[data-mode-button]&#x27;).forEach(function (peer) {
        peer.setAttribute(&#x27;aria-pressed&#x27;, String(peer.getAttribute(&#x27;data-mode-button&#x27;) === &#x27;explore&#x27;));
      });
    }
  });

  if (&#x27;IntersectionObserver&#x27; in window) {
    var observer = new IntersectionObserver(function (entries) {
      if (root.getAttribute(&#x27;data-mode&#x27;) !== &#x27;explore&#x27;) return;
      entries.forEach(function (entry) {
        if (entry.isIntersecting &amp;&amp; entry.intersectionRatio &gt; 0.35) {
          var index = chapters.indexOf(entry.target);
          if (index &gt;= 0) setCurrentChapter(index, false);
        }
      });
    }, { threshold: [0.35, 0.65] });
    chapters.forEach(function (chapter) { observer.observe(chapter); });
  }

  var profileData = {

      name: &#x27;standard&#x27;,
