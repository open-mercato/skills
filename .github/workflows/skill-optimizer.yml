name: skill-optimizer

# On-demand eval-and-optimize loop for a single skill. Runs headless Claude Code
# against a disposable sandbox copy of this repo, measures the run, proposes
# SKILL.md edits to a CANDIDATE copy, and re-measures — never committing anything.
# The artifact (report + per-pass metrics + candidate diff) is for a human to
# review; adopting a change is a separate, manual PR.
on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill directory under skills/ to optimize (e.g. om-fix)"
        required: true
        type: string
      passes:
        description: "measure->analyze->optimize iterations"
        required: false
        default: "2"
        type: string
      mock:
        description: "Built-in mock scenario to run against (review | implement; hermetic, keeps CI off real repos)"
        required: false
        default: "review"
        type: string
      run_model:
        description: "Optimization target: the model the skill is executed under (default sonnet)"
        required: false
        default: "sonnet"
        type: string
      analysis_model:
        description: "Model for the analyze/optimize + scoring calls (blank = CLI default)"
        required: false
        type: string
      open_pr:
        description: "Open a PR with the final candidate (blind-run mode)"
        required: false
        default: false
        type: boolean
      task:
        description: "Optional scenario brief for the run (blank = canned dry-run brief)"
        required: false
        type: string

jobs:
  optimize:
    runs-on: ubuntu-latest
    # contents/pull-requests write are only needed when open_pr is true.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run skill-optimizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          CI: "true"
        run: |
          node scripts/skill-optimizer.mjs \
            --skill "${{ inputs.skill }}" \
            --passes "${{ inputs.passes }}" \
            --mock "${{ inputs.mock }}" \
            --run-model "${{ inputs.run_model }}" \
            --mode api \
            --out "$GITHUB_WORKSPACE/skill-optimizer-out" \
            ${{ inputs.analysis_model && format('--analysis-model "{0}"', inputs.analysis_model) || '' }} \
            ${{ inputs.open_pr && '--open-pr' || '' }} \
            ${{ inputs.task && format('--task "{0}"', inputs.task) || '' }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-optimizer-${{ inputs.skill }}
          path: skill-optimizer-out
          if-no-files-found: warn
